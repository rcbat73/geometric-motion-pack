<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MotionForge Premium UI - Doctor Strange Hero Section</title>
    <link rel="stylesheet" href="../css/motionforge.css" />
  </head>
  <body>
    <!-- Painel Superior de Seleção de Elemento Mágico -->
    <div class="theme-panel">
      <label for="magicTheme">Conjurar Feitiço:</label>
      <select id="magicTheme" onchange="applyMagicSpell(this.value)">
        <option value="theme--fire">Chama Sagrada (Fire)</option>
        <option value="theme--arcane">Energia Arcana (Arcane)</option>
        <option value="theme--cosmic">Vórtice Cósmico (Cosmic)</option>
        <option value="theme--shadow">Magia Negra (Shadow)</option>
        <option value="theme--gold">Ouro Puro (Gold)</option>
      </select>
    </div>

    <!-- CONSTRUTO COMPLETO DA HERO SECTION (WIDER & PREMIUM UI) -->
    <header class="mf-hero-header">
      <!-- Lado Esquerdo: Conteúdo Editorial e Tipografia Premium -->
      <div class="mf-hero-content">
        <span class="mf-hero-tag">MotionForge Animation Pack</span>
        <h1 class="mf-hero-title">
          Sorcerer Supreme <br /><span>Arcane Portal</span>
        </h1>
        <p class="mf-hero-description">
          Manipule o espaço e o tempo com a Edição Hero do feitiço místico do
          Doctor Strange. Uma composição de múltiplos anéis sólidos mascarados
          com órbitas tridimensionais fluidas e faíscas dinâmicas.
        </p>
        <div class="mf-hero-actions">
          <a href="#" class="mf-btn mf-btn--primary">Conjurar Feitiço</a>
          <a href="#" class="mf-btn mf-btn--secondary">Ver Documentação</a>
        </div>
      </div>

      <!-- Lado Direito: O Teu Incrível Portal 3D Estabilizado -->
      <div class="mf-hero-visual-stage">
        <div id="spellPortal" class="strange-ring-hero theme--fire">
          <!-- As tuas 80 Partículas em SCSS (Disparam na calha exterior) -->
          <div class="particle"></div>
          <div class="particle"></div>

          <!-- O Anel de Carateres Frontal Plano -->
          <div class="ring-3d-layer ring-3d-layer--glyphs">
            <svg viewBox="0 0 320 320" xmlns="http://w3.org">
              <defs>
                <rect
                  id="mask-canvas"
                  x="0"
                  y="0"
                  width="320"
                  height="320"
                  fill="white"
                />
                <mask id="glyphs-m">
                  <use href="#mask-canvas" />
                  <circle cx="160" cy="160" r="124" fill="black" />
                </mask>
                <path
                  id="glyphCirclePath"
                  d="M 160,160 m -134,0 a 134,134 0 1,1 268,0 a 134,134 0 1,1 -268,0"
                />
              </defs>
              <circle
                cx="160"
                cy="160"
                r="153"
                mask="url(#glyphs-m)"
                class="svg-ring-line"
              />
              <text class="text-vector">
                <textPath href="#glyphCirclePath" startOffset="0%">
                  ᛖ ᚾ ᚳ ᚥ ᚻ ᚨ ᚱ ᚳ ᚠ ᚾ ᛗ ᚨ ᚷ ᛁ ᚳ ✦ ᛖ ᚾ ᚳ ᚥ ᚻ ᚨ ᚱ ᚳ ᚠ ᚾ ᛗ ᚨ ᚷ ᛁ ᚳ
                  ✦ ᛖ ᚾ ᚳ ᚥ ᚻ ᚨ ᚱ ᚳ ᚠ ᚾ ᚨ ᚷ ᛁ ᚳ ✦ ᛖ ᚾ ᚳ ᚥ ᚻ ᚨ ᚱ ᚳ ᚠ ᚾ ᛗ ᚨ ᚷ ᛁ ᚳ
                  ✦
                </textPath>
              </text>
            </svg>
          </div>

          <!-- Anéis Internos com a tua física spinX real por Hardware -->
          <div class="ring-3d-layer ring-3d-layer--middle">
            <svg viewBox="0 0 320 320" xmlns="http://w3.org">
              <defs>
                <mask id="middle-m">
                  <use href="#mask-canvas" />
                  <circle cx="160" cy="160" r="95" fill="black" />
                </mask>
              </defs>
              <circle
                cx="160"
                cy="160"
                r="112"
                mask="url(#middle-m)"
                class="svg-ring-line"
              />
              <circle
                cx="160"
                cy="160"
                r="112"
                mask="url(#middle-m)"
                class="svg-ring-glow"
              />
            </svg>
          </div>

          <div class="ring-3d-layer ring-3d-layer--inner">
            <svg viewBox="0 0 320 320" xmlns="http://w3.org">
              <defs>
                <mask id="inner-m">
                  <use href="#mask-canvas" />
                  <circle cx="160" cy="160" r="70" fill="black" />
                </mask>
              </defs>
              <circle
                cx="160"
                cy="160"
                r="84"
                mask="url(#inner-m)"
                class="svg-ring-line"
              />
              <circle
                cx="160"
                cy="160"
                r="84"
                mask="url(#inner-m)"
                class="svg-ring-glow"
              />
            </svg>
          </div>

          <div class="ring-3d-layer ring-3d-layer--mini">
            <svg viewBox="0 0 320 320" xmlns="http://w3.org">
              <defs>
                <mask id="mini-m">
                  <use href="#mask-canvas" />
                  <circle cx="160" cy="160" r="45" fill="black" />
                </mask>
              </defs>
              <circle
                cx="160"
                cy="160"
                r="58"
                mask="url(#mini-m)"
                class="svg-ring-line"
              />
              <circle
                cx="160"
                cy="160"
                r="58"
                mask="url(#mini-m)"
                class="svg-ring-glow"
              />
            </svg>
          </div>

          <div class="ring-3d-layer ring-3d-layer--core-ring">
            <svg viewBox="0 0 320 320" xmlns="http://w3.org">
              <defs>
                <mask id="core-m">
                  <use href="#mask-canvas" />
                  <circle cx="160" cy="160" r="20" fill="black" />
                </mask>
              </defs>
              <circle
                cx="160"
                cy="160"
                r="34"
                mask="url(#core-m)"
                class="svg-ring-line"
              />
              <circle
                cx="160"
                cy="160"
                r="34"
                mask="url(#core-m)"
                class="svg-ring-glow"
              />
            </svg>
          </div>

          <div class="ring-layer ring-layer--core"></div>
          <div class="pulse-wave"></div>
        </div>
      </div>
    </header>

    <script>
      function applyMagicSpell(spellClass) {
        const portal = document.getElementById("spellPortal");
        portal.className = "strange-ring-hero " + spellClass;
      }
    </script>
  </body>
</html>
