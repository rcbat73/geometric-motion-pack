<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbital Constellation — Hero Edition</title>

    <!-- Importação do CSS compilado a partir do seu motionforge.scss -->
    <link rel="stylesheet" href="../css/motionforge.css" />
  </head>
  <body>
    <!-- Wrapper Principal (Gerencia o tema. Opções: select-theme-cyan, select-theme-emerald, select-theme-fire, select-theme-cosmic) -->
    <div class="orbital-constellation select-theme-cyan">
      <!-- Camada Técnica: Grid de Fundo Sutil -->
      <div class="oc-grid"></div>

      <!-- Camada Premium: Ambiência de Iluminação Radial -->
      <div class="oc-radial-glow"></div>

      <!-- Rede de Constelações Interconectada -->
      <div class="oc-network">
        <!-- Nós estruturados com conexões duplas e fluxos cruzados -->
        <div class="oc-node oc-node-1">
          <div class="oc-packet"></div>
          <div class="oc-packet-2"></div>
        </div>
        <div class="oc-node oc-node-2">
          <div class="oc-packet"></div>
          <div class="oc-packet-2"></div>
        </div>
        <div class="oc-node oc-node-3"><div class="oc-packet"></div></div>
        <div class="oc-node oc-node-4">
          <div class="oc-packet"></div>
          <div class="oc-packet-2"></div>
        </div>
        <div class="oc-node oc-node-5">
          <div class="oc-packet"></div>
          <div class="oc-packet-2"></div>
        </div>
        <div class="oc-node oc-node-6"><div class="oc-packet"></div></div>
        <div class="oc-node oc-node-7">
          <div class="oc-packet"></div>
          <div class="oc-packet-2"></div>
        </div>
        <div class="oc-node oc-node-8"><div class="oc-packet"></div></div>
        <div class="oc-node oc-node-9">
          <div class="oc-packet"></div>
          <div class="oc-packet-2"></div>
        </div>
        <div class="oc-node oc-node-10">
          <div class="oc-packet"></div>
          <div class="oc-packet-2"></div>
        </div>
        <div class="oc-node oc-node-11"><div class="oc-packet"></div></div>
        <div class="oc-node oc-node-12">
          <div class="oc-packet"></div>
          <div class="oc-packet-2"></div>
        </div>
        <div class="oc-node oc-node-13">
          <div class="oc-packet"></div>
          <div class="oc-packet-2"></div>
        </div>
        <div class="oc-node oc-node-14"><div class="oc-packet"></div></div>
        <div class="oc-node oc-node-15">
          <div class="oc-packet"></div>
          <div class="oc-packet-2"></div>
        </div>
        <div class="oc-node oc-node-16"><div class="oc-packet"></div></div>
      </div>

      <!-- Camada de Conteúdo Isolada (Acessível para cliques e seleção de texto) -->
      <div class="oc-hero-content">
        <span class="oc-badge">Hero Edition</span>
        <h1 class="oc-title">Inteligência Orbital</h1>
        <p class="oc-description">
          Uma constelação de nós interconectados processando fluxos contínuos de
          dados e infraestrutura de IA.
        </p>
        <div class="oc-actions">
          <a href="#" class="oc-btn oc-btn-primary">Iniciar Integração</a>
          <a href="#" class="oc-btn oc-btn-secondary">Documentação API</a>
        </div>
      </div>
    </div>
  </body>
</html>
