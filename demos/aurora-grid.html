<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Grid — MotionForge Edition</title>
    <link rel="stylesheet" href="../css/motionforge.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #05060d;
      }

      .ag-demo-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        height: 100%;
        padding: 24px;
        color: #ffffff;
      }

      .ag-badge {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 6px 14px;
        border-radius: 4px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #7dd3fc;
        margin-bottom: 22px;
      }

      .ag-title {
        font-size: clamp(30px, 5vw, 50px);
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -0.5px;
        margin: 0 0 16px 0;
        max-width: 720px;
      }

      .ag-description {
        font-size: clamp(15px, 1.6vw, 17px);
        line-height: 1.6;
        color: #94a3b8;
        max-width: 560px;
        margin: 0 0 32px 0;
      }

      .ag-actions {
        display: flex;
        gap: 14px;
      }

      .ag-btn {
        padding: 12px 28px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 4px;
        text-decoration: none;
        transition: all 0.2s ease;
      }

      .ag-btn-primary {
        background-color: #ffffff;
        color: #030205;
      }
      .ag-btn-primary:hover {
        background-color: rgba(255, 255, 255, 0.9);
        transform: translateY(-1px);
      }

      .ag-btn-secondary {
        background-color: rgba(255, 255, 255, 0.03);
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(8px);
      }
      .ag-btn-secondary:hover {
        background-color: rgba(255, 255, 255, 0.07);
      }

      .ag-theme-switcher {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        padding: 18px;
        background: #05060d;
      }

      .ag-theme-switcher button {
        background: #111827;
        color: #e5e7eb;
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
      }

      .ag-theme-switcher button.active {
        outline: 2px solid #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="aurora-grid" id="ag-preview">
      <div class="ag-demo-content">
        <span class="ag-badge">MotionForge Edition</span>
        <h1 class="ag-title">Calm, precise atmosphere for modern interfaces</h1>
        <p class="ag-description">
          Aurora Grid is a pure-CSS triangular mesh with slow-drifting light —
          built to sit quietly behind heroes, pricing tables and dashboards
          without stealing attention from your content.
        </p>
        <div class="ag-actions">
          <a href="#" class="ag-btn ag-btn-primary">Explore Pack</a>
          <a href="#" class="ag-btn ag-btn-secondary">View Docs</a>
        </div>
      </div>
    </div>
    <div class="ag-theme-switcher" role="tablist">
      <button data-theme="" class="active">Aurora</button>
      <button data-theme="ag-theme-emerald">Emerald</button>
      <button data-theme="ag-theme-sunset">Sunset</button>
      <button data-theme="ag-theme-fire">Fire</button>
      <button data-theme="ag-theme-arctic">Arctic</button>
      <button data-theme="ag-theme-cosmic">Cosmic</button>
    </div>

    <script>
      const preview = document.getElementById("ag-preview");
      const buttons = document.querySelectorAll(".ag-theme-switcher button");

      buttons.forEach((btn) =>
        btn.addEventListener("click", () => {
          buttons.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          const theme = btn.getAttribute("data-theme");
          preview.className = theme ? `aurora-grid ${theme}` : "aurora-grid";
        }),
      );
    </script>
  </body>
</html>
